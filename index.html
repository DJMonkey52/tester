<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aetheris HR | Портал сотрудников</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(88, 101, 242, 0.12), transparent 60%),
                        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1), transparent 55%),
                        linear-gradient(135deg, #0B0C10 0%, #1A1B2E 50%, #0F0F1A 100%);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        body.light {
            background: radial-gradient(circle at 10% 20%, rgba(88, 101, 242, 0.06), transparent 60%),
                        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05), transparent 55%),
                        linear-gradient(135deg, #f0f4ff 0%, #e8edf9 100%);
        }

        /* CSS переменные */
        :root {
            --glass-bg: rgba(20, 22, 36, 0.7);
            --glass-border: rgba(255, 255, 255, 0.06);
            --sidebar-bg: rgba(15, 17, 26, 0.85);
            --text-primary: #F0F3FA;
            --text-secondary: #A0A8C3;
            --text-muted: #6C728E;
            --accent: #6366F1;
            --accent-glow: #818cf8;
            --accent-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --card-bg: rgba(30, 33, 48, 0.6);
            --border-light: rgba(255, 255, 255, 0.06);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
            --input-bg: rgba(15, 17, 26, 0.8);
        }

        body.light {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.05);
            --sidebar-bg: rgba(245, 247, 255, 0.9);
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --accent: #5865F2;
            --accent-glow: #7984f5;
            --accent-dark: #4752C4;
            --card-bg: rgba(255, 255, 255, 0.7);
            --border-light: rgba(0, 0, 0, 0.06);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
        }

        /* Layout */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 32px 24px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            transition: all 0.3s;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
        }

        .logo h2 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #A5B4FC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        body.light .logo h2 {
            background: linear-gradient(135deg, #1e1b4b, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 1rem;
        }

        .nav-item i {
            width: 28px;
            font-size: 1.3rem;
        }

        .nav-item:hover {
            background: rgba(99, 102, 241, 0.15);
            color: var(--text-primary);
            transform: translateX(6px);
        }

        .nav-item.active {
            background: linear-gradient(95deg, rgba(99, 102, 241, 0.25), rgba(79, 70, 229, 0.12));
            color: var(--accent-glow);
            border-left: 3px solid var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 320px;
            padding: 32px 40px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .page-title i {
            margin-right: 14px;
            color: var(--accent);
        }

        .theme-toggle {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        /* Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 36px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
            animation: fadeSlide 0.4s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input, select, textarea {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 18px;
            padding: 14px 18px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            background: linear-gradient(105deg, var(--accent), var(--accent-dark));
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.25s;
            margin-top: 16px;
        }

        button:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
        }

        .webhook-info {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }

        .webhook-info i {
            color: var(--accent);
            font-size: 1rem;
        }

        .alert {
            padding: 14px 20px;
            border-radius: 20px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.15);
            border-left: 3px solid #10b981;
            color: #34d399;
            display: flex;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.12);
            border-left: 3px solid #ef4444;
            color: #fca5a5;
            display: flex;
        }

        hr {
            margin: 20px 0;
            border-color: var(--border-light);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 90px;
                padding: 24px 12px;
            }
            .sidebar .logo h2, .sidebar .nav-item span {
                display: none;
            }
            .logo {
                justify-content: center;
            }
            .nav-item {
                justify-content: center;
                padding: 14px;
            }
            .nav-item i {
                margin: 0;
            }
            .main-content {
                margin-left: 90px;
                padding: 20px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
            .page-title {
                font-size: 1.4rem;
            }
            .glass-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar с 3 кнопками -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-feather"></i></div>
                <h2>Aetheris</h2>
            </div>
            <div class="nav-menu">
                <div class="nav-item active" data-page="weekly">
                    <i class="fas fa-calendar-week"></i>
                    <span>📊 Еженедельный отчёт</span>
                </div>
                <div class="nav-item" data-page="promotion">
                    <i class="fas fa-arrow-up"></i>
                    <span>⬆️ Отчёт на повышение</span>
                </div>
                <div class="nav-item" data-page="exam">
                    <i class="fas fa-pen-clip"></i>
                    <span>📝 Запись на экзамен</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title" id="pageTitle">
                    <i class="fas fa-calendar-week"></i> Еженедельный отчёт
                </div>
                <div class="theme-toggle" id="themeSwitch">
                    <i class="fas fa-sun"></i>
                    <span>Светлая тема</span>
                </div>
            </div>

            <!-- СТРАНИЦА 1: Еженедельный отчёт -->
            <div id="weeklyPage" class="page-container">
                <div class="glass-card">
                    <div class="webhook-info">
                        <i class="fab fa-discord"></i>
                        <span>📨 Отправка в Discord канал <strong>#еженедельные-отчёты</strong></span>
                    </div>
                    <form id="weeklyForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Сотрудник</label>
                                <input type="text" id="weeklyName" placeholder="Иванов Иван" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-calendar"></i> Отчётная неделя</label>
                                <input type="week" id="weeklyWeek" required>
                            </div>
                            <div class="form-group full-width">
                                <label><i class="fas fa-check-circle"></i> Что сделано?</label>
                                <textarea id="weeklyDone" rows="4" placeholder="• Завершил спринт&#10;• Написал документацию&#10;• Провёл код-ревью" required></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label><i class="fas fa-rocket"></i> Планы на следующую неделю</label>
                                <textarea id="weeklyPlan" rows="3" placeholder="• Новая фича&#10;• Оптимизация запросов" required></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label><i class="fas fa-exclamation-triangle"></i> Проблемы / блокеры</label>
                                <textarea id="weeklyProblems" rows="2" placeholder="Опишите сложности..."></textarea>
                            </div>
                        </div>
                        <button type="submit"><i class="fab fa-discord"></i> Отправить в Discord</button>
                    </form>
                </div>
            </div>

            <!-- СТРАНИЦА 2: Отчёт на повышение -->
            <div id="promotionPage" class="page-container" style="display: none;">
                <div class="glass-card">
                    <div class="webhook-info">
                        <i class="fab fa-discord"></i>
                        <span>📨 Отправка в Discord канал <strong>#запросы-на-повышение</strong></span>
                    </div>
                    <form id="promotionForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> ФИО</label>
                                <input type="text" id="promotionName" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-briefcase"></i> Текущая должность</label>
                                <input type="text" id="currentPosition" placeholder="Junior Developer" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-chart-line"></i> Желаемая должность</label>
                                <input type="text" id="desiredPosition" placeholder="Middle Developer" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-coins"></i> Ожидания (грейд/ЗП)</label>
                                <input type="text" id="expectedGrade" placeholder="Middle / от 180 000₽">
                            </div>
                            <div class="form-group full-width">
                                <label><i class="fas fa-medal"></i> Достижения за последние 6 месяцев</label>
                                <textarea id="achievements" rows="4" placeholder="• Увеличил покрытие тестами на 30%&#10;• Внедрил CI/CD&#10;• Провёл 5 воркшопов" required></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label><i class="fas fa-heart"></i> Почему вы заслуживаете повышение?</label>
                                <textarea id="motivation" rows="4" placeholder="Опишите ваш вклад, лидерские качества, профессиональный рост..." required></textarea>
                            </div>
                        </div>
                        <button type="submit"><i class="fab fa-discord"></i> Отправить запрос</button>
                    </form>
                </div>
            </div>

            <!-- СТРАНИЦА 3: Запись на экзамен -->
            <div id="examPage" class="page-container" style="display: none;">
                <div class="glass-card">
                    <div class="webhook-info">
                        <i class="fab fa-discord"></i>
                        <span>📨 Отправка в Discord канал <strong>#запись-на-экзамен</strong></span>
                    </div>
                    <form id="examForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> ФИО</label>
                                <input type="text" id="examName" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" id="examEmail" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-graduation-cap"></i> Тип экзамена</label>
                                <select id="examType" required>
                                    <option value="">Выберите...</option>
                                    <option value="Техническое собеседование">💻 Техническое собеседование</option>
                                    <option value="Экзамен на грейд">📈 Экзамен на грейд (Middle → Senior)</option>
                                    <option value="Сертификация">📜 Профессиональная сертификация</option>
                                    <option value="Внутренний экзамен">🏢 Внутренний экзамен</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-calendar-alt"></i> Желаемая дата</label>
                                <input type="date" id="examDate" required>
                            </div>
                            <div class="form-group full-width">
                                <label><i class="fas fa-tag"></i> Направление / технология</label>
                                <input type="text" id="examTopic" placeholder="Например: React, Java, Python, DevOps...">
                            </div>
                            <div class="form-group full-width">
                                <label><i class="fas fa-comment"></i> Комментарий / дополнительные пожелания</label>
                                <textarea id="examComment" rows="3" placeholder="Укажите удобное время, ссылки на портфолио и т.д."></textarea>
                            </div>
                        </div>
                        <button type="submit"><i class="fab fa-discord"></i> Записаться на экзамен</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // 🔒 ФИКСИРОВАННЫЕ ВЕБХУКИ ДЛЯ КАЖДОГО ТИПА ОТЧЁТА
        // ============================================
        // ⚠️ ЗАМЕНИТЕ ЭТИ ССЫЛКИ НА ВАШИ РЕАЛЬНЫЕ DISCORD WEBHOOK URL
        // ============================================
        const WEBHOOKS = {
            weekly: 'https://discord.com/api/webhooks/1501267296432291945/fCHeDuYb4eVyHyUT_SRJgtnjE6DlbTCwubCKP_NEfytsMohVPDz5wHSYObiEmNqvEM2b',     // 🔁 Еженедельные отчёты
            promotion: 'https://discord.com/api/webhooks/1501267296432291945/fCHeDuYb4eVyHyUT_SRJgtnjE6DlbTCwubCKP_NEfytsMohVPDz5wHSYObiEmNqvEM2b',   // ⬆️ Запросы на повышение
            exam: 'https://discord.com/api/webhooks/1501267296432291945/fCHeDuYb4eVyHyUT_SRJgtnjE6DlbTCwubCKP_NEfytsMohVPDz5wHSYObiEmNqvEM2b'        // 📝 Запись на экзамен
        };

        // Тема
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.body.classList.add('light');
                document.querySelector('#themeSwitch i').className = 'fas fa-moon';
                document.querySelector('#themeSwitch span').innerText = 'Тёмная тема';
            } else {
                document.body.classList.remove('light');
                document.querySelector('#themeSwitch i').className = 'fas fa-sun';
                document.querySelector('#themeSwitch span').innerText = 'Светлая тема';
            }
        }

        function toggleTheme() {
            if (document.body.classList.contains('light')) {
                document.body.classList.remove('light');
                localStorage.setItem('theme', 'dark');
                document.querySelector('#themeSwitch i').className = 'fas fa-sun';
                document.querySelector('#themeSwitch span').innerText = 'Светлая тема';
            } else {
                document.body.classList.add('light');
                localStorage.setItem('theme', 'light');
                document.querySelector('#themeSwitch i').className = 'fas fa-moon';
                document.querySelector('#themeSwitch span').innerText = 'Тёмная тема';
            }
        }

        // Навигация между страницами
        function navigateTo(page) {
            document.querySelectorAll('.page-container').forEach(container => {
                container.style.display = 'none';
            });
            document.getElementById(`${page}Page`).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === page) {
                    item.classList.add('active');
                }
            });
            
            const titles = {
                weekly: { icon: 'fa-calendar-week', text: 'Еженедельный отчёт' },
                promotion: { icon: 'fa-arrow-up', text: 'Отчёт на повышение' },
                exam: { icon: 'fa-pen-clip', text: 'Запись на экзамен' }
            };
            const title = titles[page];
            document.querySelector('.page-title').innerHTML = `<i class="fas ${title.icon}"></i> ${title.text}`;
        }

        // Отправка в Discord с фиксированным вебхуком
        async function sendToDiscord(webhookUrl, content, username = 'Aetheris HR') {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, content })
            });
            if (!response.ok) throw new Error(`Ошибка HTTP ${response.status}`);
            return true;
        }

        // Форматеры сообщений
        function formatWeekly(data) {
            return `**📊 ЕЖЕНЕДЕЛЬНЫЙ ОТЧЁТ**\n**👤 Сотрудник:** ${data.name}\n**📅 Неделя:** ${data.week}\n\n**✅ СДЕЛАНО:**\n${data.done}\n\n**🎯 ПЛАНЫ:**\n${data.plan}\n\n**⚠️ ПРОБЛЕМЫ:**\n${data.problems || '—'}\n\n_Отправлено через Aetheris HR_`;
        }

        function formatPromotion(data) {
            return `**⬆️ ЗАПРОС НА ПОВЫШЕНИЕ**\n**👤 Сотрудник:** ${data.name}\n**💼 Текущая роль:** ${data.currentPosition}\n**🎯 Желаемая роль:** ${data.desiredPosition}\n**💰 Ожидания:** ${data.expectedGrade || 'обсуждаемо'}\n\n**🏆 ДОСТИЖЕНИЯ (6 мес):**\n${data.achievements}\n\n**💡 ОБОСНОВАНИЕ:**\n${data.motivation}\n\n_Требует рассмотрения руководством_`;
        }

        function formatExam(data) {
            return `**📝 ЗАПИСЬ НА ЭКЗАМЕН**\n**👤 Сотрудник:** ${data.name}\n**📧 Email:** ${data.email}\n**📚 Тип экзамена:** ${data.examType}\n**📅 Желаемая дата:** ${data.date}\n**🏷️ Направление:** ${data.topic || 'не указано'}\n**💬 Комментарий:** ${data.comment || '—'}\n\n_Ожидайте подтверждения от HR_`;
        }

        // Показать уведомление
        function showAlert(message, type, containerSelector) {
            const container = document.querySelector(containerSelector);
            const existing = container.querySelector('.alert');
            if (existing) existing.remove();
            
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.querySelector('.glass-card').insertBefore(alert, container.querySelector('.glass-card').firstChild);
            
            setTimeout(() => alert.remove(), 5000);
        }

        // ========== ОБРАБОТЧИКИ ФОРМ ==========
        
        // Еженедельный отчёт
        document.getElementById('weeklyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отправка...';
            
            try {
                const data = {
                    name: document.getElementById('weeklyName').value.trim(),
                    week: document.getElementById('weeklyWeek').value,
                    done: document.getElementById('weeklyDone').value.trim(),
                    plan: document.getElementById('weeklyPlan').value.trim(),
                    problems: document.getElementById('weeklyProblems').value.trim()
                };
                if (!data.name || !data.week || !data.done || !data.plan) throw new Error('Заполните все обязательные поля');
                
                await sendToDiscord(WEBHOOKS.weekly, formatWeekly(data), 'Еженедельный отчёт');
                showAlert('✅ Отчёт успешно отправлен в Discord!', 'success', '#weeklyPage');
                e.target.reset();
                // Установить текущую неделю
                const today = new Date();
                const year = today.getFullYear();
                const weekNum = Math.ceil((((today - new Date(year, 0, 1)) / 86400000) + 1) / 7);
                document.getElementById('weeklyWeek').value = `${year}-W${weekNum.toString().padStart(2, '0')}`;
            } catch (err) {
                showAlert(`❌ Ошибка: ${err.message}`, 'error', '#weeklyPage');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-discord"></i> Отправить в Discord';
            }
        });

        // Отчёт на повышение
        document.getElementById('promotionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отправка...';
            
            try {
                const data = {
                    name: document.getElementById('promotionName').value.trim(),
                    currentPosition: document.getElementById('currentPosition').value.trim(),
                    desiredPosition: document.getElementById('desiredPosition').value.trim(),
                    achievements: document.getElementById('achievements').value.trim(),
                    motivation: document.getElementById('motivation').value.trim(),
                    expectedGrade: document.getElementById('expectedGrade').value.trim()
                };
                if (!data.name || !data.currentPosition || !data.desiredPosition || !data.achievements || !data.motivation) {
                    throw new Error('Заполните все обязательные поля');
                }
                await sendToDiscord(WEBHOOKS.promotion, formatPromotion(data), 'Запрос на повышение');
                showAlert('✅ Запрос на повышение отправлен!', 'success', '#promotionPage');
                e.target.reset();
            } catch (err) {
                showAlert(`❌ Ошибка: ${err.message}`, 'error', '#promotionPage');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-discord"></i> Отправить запрос';
            }
        });

        // Запись на экзамен
        document.getElementById('examForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отправка...';
            
            try {
                const data = {
                    name: document.getElementById('examName').value.trim(),
                    email: document.getElementById('examEmail').value.trim(),
                    examType: document.getElementById('examType').value,
                    date: document.getElementById('examDate').value,
                    topic: document.getElementById('examTopic').value.trim(),
                    comment: document.getElementById('examComment').value.trim()
                };
                if (!data.name || !data.email || !data.examType || !data.date) {
                    throw new Error('Заполните все обязательные поля');
                }
                await sendToDiscord(WEBHOOKS.exam, formatExam(data), 'Запись на экзамен');
                showAlert('✅ Заявка на экзамен отправлена!', 'success', '#examPage');
                e.target.reset();
            } catch (err) {
                showAlert(`❌ Ошибка: ${err.message}`, 'error', '#examPage');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-discord"></i> Записаться на экзамен';
            }
        });

        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                navigateTo(item.dataset.page);
            });
        });

        document.getElementById('themeSwitch').addEventListener('click', toggleTheme);
        
        // Инициализация
        initTheme();
        navigateTo('weekly');
        
        // Установка текущей недели
        const today = new Date();
        const year = today.getFullYear();
        const weekNum = Math.ceil((((today - new Date(year, 0, 1)) / 86400000) + 1) / 7);
        document.getElementById('weeklyWeek').value = `${year}-W${weekNum.toString().padStart(2, '0')}`;
        
        // Минимальная дата для экзамена
        document.getElementById('examDate').min = today.toISOString().split('T')[0];
    </script>
</body>
</html>
