<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Отчёт | Система подачи отчётов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Карточка отчёта */
        .report-card {
            background: rgba(18, 22, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 1px solid rgba(88, 101, 242, 0.3);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Заголовок */
        .card-header {
            background: linear-gradient(135deg, #1e1b4b, #2d2a5e);
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h1 i {
            color: #6366f1;
        }

        .card-header p {
            color: #a0a8c3;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Содержание */
        .card-body {
            padding: 32px;
        }

        /* Секции */
        .section {
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 28px;
        }

        .section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #818cf8;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .section-title i {
            font-size: 1.2rem;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 18, 35, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 0.95rem;
            color: #f0f3fa;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .input-group input::placeholder {
            color: #4b5563;
        }

        /* Период */
        .period-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 12px;
        }

        .period-info {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 12px;
            text-align: center;
            color: #a5b4fc;
            font-size: 0.9rem;
        }

        /* Действия с доказательствами */
        .actions-list {
            margin-bottom: 20px;
        }

        .action-item {
            background: rgba(15, 18, 35, 0.6);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .action-name {
            font-weight: 600;
            color: #e0e7ff;
            font-size: 1rem;
        }

        .action-points {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
        }

        .action-screenshot {
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .screenshot-input {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 8px 12px;
        }

        .screenshot-input i {
            color: #6366f1;
            font-size: 1rem;
        }

        .screenshot-input input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            color: #f0f3fa;
            font-size: 0.85rem;
        }

        .screenshot-input input::placeholder {
            color: #4b5563;
        }

        .remove-action {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            color: #f87171;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .remove-action:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* Кнопка добавления */
        .add-action-btn {
            width: 100%;
            background: rgba(99, 102, 241, 0.15);
            border: 1px dashed rgba(99, 102, 241, 0.4);
            border-radius: 14px;
            padding: 14px;
            color: #818cf8;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .add-action-btn:hover {
            background: rgba(99, 102, 241, 0.25);
            border-color: #6366f1;
        }

        /* Пустое состояние */
        .empty-actions {
            text-align: center;
            padding: 30px;
            color: #6b7280;
            background: rgba(15, 18, 35, 0.4);
            border-radius: 16px;
            margin-bottom: 12px;
        }

        /* Кнопка отправки */
        .submit-btn {
            width: 100%;
            background: linear-gradient(105deg, #6366f1, #4f46e5);
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
        }

        /* Уведомления */
        .alert {
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.15);
            border-left: 3px solid #10b981;
            color: #34d399;
            display: flex;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.12);
            border-left: 3px solid #ef4444;
            color: #fca5a5;
            display: flex;
        }

        /* Ранги */
        .rank-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Адаптив */
        @media (max-width: 640px) {
            .card-body {
                padding: 20px;
            }
            .period-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .action-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .screenshot-input {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="report-card">
            <div class="card-header">
                <h1>
                    <i class="fas fa-scroll"></i>
                    ИНФОРМАЦИЯ О СОТРУДНИКЕ
                </h1>
                <p>Заполните форму для подачи еженедельного отчёта</p>
            </div>
            <div class="card-body">
                <div id="alertContainer"></div>

                <!-- ИГРОВОЙ НИКНЕЙМ -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-user"></i>
                        ИГРОВОЙ НИКНЕЙМ
                    </div>
                    <div class="input-group">
                        <input type="text" id="nickname" placeholder="Введите никнейм">
                    </div>
                </div>

                <!-- РАНГ СОТРУДНИКА -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-rank"></i>
                        РАНГ СОТРУДНИКА
                    </div>
                    <div class="input-group">
                        <select id="rank">
                            <option value="">-- Выберите ранг --</option>
                            <option value="Специалист (3)">Специалист (3)</option>
                            <option value="Капрал (4)">Капрал (4)</option>
                            <option value="Сержант (5)">Сержант (5)</option>
                            <option value="Штаб-сержант (6)">Штаб-сержант (6)</option>
                            <option value="Уорент-офицер (7)">Уорент-офицер (7)</option>
                            <option value="Старший Уорент-офицер (8)">Старший Уорент-офицер (8)</option>
                            <option value="Лейтенант (9)">Лейтенант (9)</option>
                            <option value="Капитан (10)">Капитан (10)</option>
                            <option value="Майор (11)">Майор (11)</option>
                            <option value="Подполковник (12)">Подполковник (12)</option>
                        </select>
                    </div>
                </div>

                <!-- ПЕРИОД ОТЧЕТА -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-calendar-week"></i>
                        ПЕРИОД ОТЧЕТА
                        <span style="font-size: 0.7rem; background: #4f46e5; padding: 2px 10px; border-radius: 20px;">ЗА НЕДЕЛЮ</span>
                    </div>
                    <div class="period-row">
                        <div class="input-group">
                            <label>ДАТА НАЧАЛА</label>
                            <input type="date" id="dateStart">
                        </div>
                        <div class="input-group">
                            <label>ДАТА ОКОНЧАНИЯ</label>
                            <input type="date" id="dateEnd">
                        </div>
                    </div>
                    <div class="period-info" id="periodInfo">
                        04.05.2026 – 10.05.2026 (7 дн.)
                    </div>
                </div>

                <!-- ДЕЙСТВИЯ С ДОКАЗАТЕЛЬСТВАМИ -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-clipboard-list"></i>
                        ДЕЙСТВИЯ С ДОКАЗАТЕЛЬСТВАМИ
                    </div>
                    
                    <div id="actionsContainer">
                        <div id="emptyActions" class="empty-actions">
                            <i class="fas fa-info-circle"></i> Нет действий с доказательствами
                        </div>
                        <div id="actionsList"></div>
                    </div>

                    <button class="add-action-btn" id="addActionBtn">
                        <i class="fas fa-plus"></i> ДОБАВИТЬ
                    </button>
                </div>

                <!-- Кнопка отправки -->
                <button class="submit-btn" id="submitBtn">
                    <i class="fab fa-discord"></i> ОТПРАВИТЬ ОТЧЁТ
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ФИКСИРОВАННЫЙ ВЕБХУК (ЗАМЕНИТЕ НА ВАШ)
        // ============================================
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1501267296432291945/fCHeDuYb4eVyHyUT_SRJgtnjE6DlbTCwubCKP_NEfytsMohVPDz5wHSYObiEmNqvEM2b';

        // Список активностей
        const ACTIVITIES = [
            { name: "Участие в ГМП", points: "10 баллов", basePoints: 10 },
            { name: "Участие в МП", points: "5 баллов", basePoints: 5 },
            { name: "Участие в лекции/тренировке", points: "5/10 балла", basePoints: "5-10" },
            { name: "Проведение лекции/тренировки", points: "10/15 баллов", basePoints: "10-15" },
            { name: "Отбитие ФЗ/ФТ", points: "15 баллов", basePoints: 15 },
            { name: "Участие в оцеплении захваченной Государственной структуры/Банка", points: "10 баллов", basePoints: 10 },
            { name: "Участие в отбитии поезда", points: "5 баллов", basePoints: 5 },
            { name: "Примечание: 1 скриншот с Хуманкой", points: "особое", basePoints: 0 },
            { name: "Участие в рейде/экономическом рейде", points: "10/20 баллов", basePoints: "10-20" },
            { name: "Участие в поставке", points: "10 баллов", basePoints: 10 },
            { name: "Примечание: на поставке NG, EMS 1 скриншот (начало/загрузка)", points: "особое", basePoints: 0 },
            { name: "Участие в отбитие анальгетика", points: "15 баллов", basePoints: 15 },
            { name: "Задержание", points: "5 баллов", basePoints: 5 },
            { name: "Примечание: Должен быть номер нашивки", points: "особое", basePoints: 0 },
            { name: "Участие в мед. проверке", points: "10 баллов", basePoints: 10 },
            { name: "Участие в прок. проверке", points: "10 баллов", basePoints: 10 },
            { name: "Участие в AirDrop", points: "5 баллов", basePoints: 5 },
            { name: "Примечание: 1 скриншот то что вы находитесь в круге дропа", points: "особое", basePoints: 0 },
            { name: "Патруль по ФЗ/вне ФЗ(1 час)", points: "4б/8б (скрины каждые 30 мин)", basePoints: "4-8" },
            { name: "Участие в Вечернем построении", points: "4б", basePoints: 4 },
            { name: "Участие в ЧР", points: "10б", basePoints: 10 },
            { name: "Примечание: 1 скриншот то что в чате написали что гос захватили ЧР и вы в зоне ЧР", points: "особое", basePoints: 0 },
            { name: "Передача задержанного сотрудникам CID", points: "10б", basePoints: 10 }
        ];

        let actions = [];

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU');
        }

        function updatePeriodInfo() {
            const start = document.getElementById('dateStart').value;
            const end = document.getElementById('dateEnd').value;
            const infoSpan = document.getElementById('periodInfo');
            
            if (start && end) {
                const startDate = new Date(start);
                const endDate = new Date(end);
                const diffTime = Math.abs(endDate - startDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                infoSpan.innerHTML = `${formatDate(start)} – ${formatDate(end)} (${diffDays} дн.)`;
            } else if (start) {
                infoSpan.innerHTML = `${formatDate(start)} – (дата окончания не выбрана)`;
            } else {
                const today = new Date();
                const weekStart = new Date(today);
                weekStart.setDate(today.getDate() - today.getDay() + 1);
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekStart.getDate() + 6);
                infoSpan.innerHTML = `${formatDate(weekStart)} – ${formatDate(weekEnd)} (7 дн.)`;
            }
        }

        function renderActions() {
            const container = document.getElementById('actionsList');
            const emptyDiv = document.getElementById('emptyActions');
            
            if (actions.length === 0) {
                emptyDiv.style.display = 'block';
                container.innerHTML = '';
                return;
            }
            
            emptyDiv.style.display = 'none';
            
            container.innerHTML = actions.map((action, idx) => `
                <div class="action-item">
                    <div class="action-header">
                        <span class="action-name">${escapeHtml(action.activityName)}</span>
                        <span class="action-points">${action.pointsValue} баллов</span>
                    </div>
                    <div class="action-screenshot">
                        <div class="screenshot-input">
                            <i class="fas fa-image"></i>
                            <input type="text" placeholder="Ссылка на скриншот / доказательство" value="${escapeHtml(action.screenshot || '')}" data-idx="${idx}" class="screenshot-link">
                        </div>
                        <button class="remove-action" data-idx="${idx}">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </div>
                </div>
            `).join('');
            
            // Назначить обработчики на поля скриншотов
            document.querySelectorAll('.screenshot-link').forEach(input => {
                input.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    if (!isNaN(idx) && actions[idx]) {
                        actions[idx].screenshot = e.target.value;
                    }
                });
            });
            
            document.querySelectorAll('.remove-action').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    if (!isNaN(idx)) {
                        actions.splice(idx, 1);
                        renderActions();
                    }
                });
            });
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function sendToDiscord(content) {
            if (!WEBHOOK_URL) {
                throw new Error('Webhook не настроен');
            }
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'HR Отчёт', content })
            });
            if (!response.ok) throw new Error(`Ошибка HTTP ${response.status}`);
            return true;
        }

        function formatReport() {
            const nickname = document.getElementById('nickname').value.trim();
            const rank = document.getElementById('rank').value;
            const startDate = document.getElementById('dateStart').value;
            const endDate = document.getElementById('dateEnd').value;
            
            let periodStr = '';
            if (startDate && endDate) {
                periodStr = `${formatDate(startDate)} – ${formatDate(endDate)}`;
            } else {
                const today = new Date();
                const weekStart = new Date(today);
                weekStart.setDate(today.getDate() - today.getDay() + 1);
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekStart.getDate() + 6);
                periodStr = `${formatDate(weekStart)} – ${formatDate(weekEnd)}`;
            }
            
            let actionsText = '';
            let totalPoints = 0;
            
            actions.forEach(action => {
                let pointsNum = 0;
                const pointsMatch = action.pointsValue.match(/(\d+)/);
                if (pointsMatch) pointsNum = parseInt(pointsMatch[0]);
                totalPoints += pointsNum;
                
                actionsText += `\n**• ${action.activityName}** — ${action.pointsValue} баллов\n`;
                if (action.screenshot) {
                    actionsText += `  📎 Доказательство: ${action.screenshot}\n`;
                } else {
                    actionsText += `  ⚠️ Доказательство не приложено\n`;
                }
            });
            
            if (actions.length === 0) {
                actionsText = '\nНет действий с доказательствами';
            }
            
            return `**📋 ЕЖЕНЕДЕЛЬНЫЙ ОТЧЁТ**

**👤 Игровой никнейм:** ${nickname || 'Не указан'}
**🎖️ Ранг:** ${rank || 'Не выбран'}

**📅 Период отчёта:** ${periodStr}

**📊 ДЕЙСТВИЯ С ДОКАЗАТЕЛЬСТВАМИ:**
${actionsText}

**🏆 ИТОГО БАЛЛОВ:** ${totalPoints}

_Отправлено через HR систему_`;
        }

        document.getElementById('addActionBtn').addEventListener('click', () => {
            // Создаём модальное окно выбора активности
            const modalHtml = `
                <div id="activityModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;">
                    <div style="background: #1a1f3a; border-radius: 24px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;">
                        <h3 style="color: white; margin-bottom: 20px;">Выберите действие</h3>
                        <div id="activityList" style="display: flex; flex-direction: column; gap: 10px;">
                            ${ACTIVITIES.map((act, idx) => `
                                <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; cursor: pointer; transition: all 0.2s;" class="activity-option" data-idx="${idx}">
                                    <div style="font-weight: 600; color: #e0e7ff;">${escapeHtml(act.name)}</div>
                                    <div style="font-size: 0.8rem; color: #818cf8;">${act.points}</div>
                                </div>
                            `).join('')}
                        </div>
                        <button id="closeModalBtn" style="margin-top: 20px; width: 100%; background: #4f46e5; border: none; padding: 12px; border-radius: 12px; color: white; cursor: pointer;">Отмена</button>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            document.querySelectorAll('.activity-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const idx = parseInt(opt.dataset.idx);
                    const activity = ACTIVITIES[idx];
                    actions.push({
                        activityName: activity.name,
                        pointsValue: activity.points,
                        screenshot: ''
                    });
                    renderActions();
                    document.getElementById('activityModal').remove();
                });
            });
            
            document.getElementById('closeModalBtn').addEventListener('click', () => {
                document.getElementById('activityModal').remove();
            });
        });

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const nickname = document.getElementById('nickname').value.trim();
            const rank = document.getElementById('rank').value;
            
            if (!nickname) {
                showAlert('Пожалуйста, введите игровой никнейм', 'error');
                return;
            }
            if (!rank) {
                showAlert('Пожалуйста, выберите ранг сотрудника', 'error');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отправка...';
            
            try {
                const content = formatReport();
                await sendToDiscord(content);
                showAlert('✅ Отчёт успешно отправлен в Discord!', 'success');
                
                // Очистка формы (опционально)
                document.getElementById('nickname').value = '';
                document.getElementById('rank').value = '';
                document.getElementById('dateStart').value = '';
                document.getElementById('dateEnd').value = '';
                actions = [];
                renderActions();
                updatePeriodInfo();
            } catch (err) {
                showAlert(`❌ Ошибка: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-discord"></i> ОТПРАВИТЬ ОТЧЁТ';
            }
        });

        // Установить даты по умолчанию (текущая неделя)
        function setDefaultDates() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            
            document.getElementById('dateStart').value = monday.toISOString().split('T')[0];
            document.getElementById('dateEnd').value = sunday.toISOString().split('T')[0];
            updatePeriodInfo();
        }

        document.getElementById('dateStart').addEventListener('change', updatePeriodInfo);
        document.getElementById('dateEnd').addEventListener('change', updatePeriodInfo);
        
        setDefaultDates();
        renderActions();
    </script>
</body>
</html>
