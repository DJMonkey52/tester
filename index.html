<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>ARMY | Система отчётов</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }

    body {
      background: #1a1e1b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 750px;
      width: 100%;
      background: #0f1211;
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 2rem 1.8rem 2.5rem;
      border: 1px solid #3e4a3c;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    h1 {
      font-size: 4.2rem;
      font-weight: 800;
      letter-spacing: 12px;
      text-align: center;
      color: #d4cba0;
      text-shadow: 0 4px 0 #3b4a2c, 0 8px 12px black;
      background: linear-gradient(180deg, #2d3522 0%, #141b10 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 4px #1f2e0a);
      margin-bottom: 0.2rem;
      word-break: break-word;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.3rem;
    }

    .nav-btn {
      background: #232e21;
      border: none;
      padding: 0.9rem 1.4rem;
      border-radius: 2.5rem;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.8px;
      color: #c2bc8b;
      background: #1e2619;
      box-shadow: 0 6px 0 #0b0f09, 0 8px 18px rgba(0,0,0,0.7);
      border: 1px solid #5a6e47;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
      flex: 1 1 auto;
      min-width: 130px;
      white-space: nowrap;
    }

    .nav-btn.active {
      background: #3f5530;
      color: #f3efc7;
      border-color: #b9aa5c;
      box-shadow: 0 4px 0 #1e2716, 0 10px 18px black;
      transform: translateY(2px);
    }

    .nav-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0e1308, 0 8px 14px black;
    }

    .form-panel {
      display: none;
      flex-direction: column;
      gap: 1.5rem;
      background: #1e241c;
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      border: 1px solid #414f38;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
    }

    .form-panel.active {
      display: flex;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .field {
      flex: 1 1 200px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      color: #b9b382;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    input, select {
      background: #12160f;
      border: 1px solid #4b5a3a;
      border-radius: 1.2rem;
      padding: 0.8rem 1rem;
      color: #ede7c0;
      font-weight: 500;
      font-size: 0.95rem;
      outline: none;
      box-shadow: inset 0 2px 6px black;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #c7b95e;
      box-shadow: 0 0 10px #5f6b3c;
    }

    .date-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .activities-box {
      background: #0e130d;
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid #465538;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
      background: #1b2319;
      padding: 0.7rem 1rem;
      border-radius: 1.2rem;
      border: 1px solid #3b4a30;
    }

    .activity-item input {
      flex: 2 1 130px;
      min-width: 130px;
    }

    .activity-item input[type="number"] {
      flex: 1 1 80px;
      min-width: 70px;
      max-width: 100px;
    }

    .remove-activity {
      background: #421f1a;
      border: none;
      color: #e0b4a8;
      font-weight: bold;
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid #7b4a3a;
      transition: 0.2s;
      background: #2f1e17;
    }

    .remove-activity:hover {
      background: #6b3729;
      color: white;
    }

    .add-activity-btn {
      background: #2d3a22;
      border: 1px dashed #b9aa5c;
      color: #dacd7c;
      font-weight: bold;
      padding: 0.7rem;
      border-radius: 2rem;
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
      font-size: 0.9rem;
      letter-spacing: 0.4px;
    }

    .add-activity-btn:hover {
      background: #3f512e;
      color: #f7efb0;
    }

    .total-score {
      color: #efdb7c;
      font-weight: 700;
      font-size: 1.2rem;
      text-align: right;
      margin-top: 0.3rem;
      background: #1b2117;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      display: inline-block;
      align-self: flex-end;
      border: 1px solid #6f7a46;
    }

    .exam-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .discord-tag {
      background: #1a1c1a;
    }

    button.submit-btn {
      background: #5b6b3a;
      border: none;
      padding: 1rem 2rem;
      border-radius: 2.5rem;
      font-weight: bold;
      font-size: 1rem;
      letter-spacing: 1px;
      color: #f7f3cf;
      background: #414f2a;
      box-shadow: 0 6px 0 #222f17, 0 8px 18px black;
      border: 1px solid #a3a064;
      cursor: pointer;
      transition: 0.15s;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    button.submit-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #191f10, 0 8px 18px black;
    }

    .promotion-date {
      width: 100%;
    }

    @media (max-width: 500px) {
      .container {
        padding: 1.5rem 1rem;
      }
      h1 {
        font-size: 3.2rem;
        letter-spacing: 6px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>ARMY</h1>

  <div class="nav-buttons">
    <button class="nav-btn active" data-panel="weekly">📋 Еженедельный отчёт</button>
    <button class="nav-btn" data-panel="promotion">⬆️ Отчёт на повышение</button>
    <button class="nav-btn" data-panel="exam">📝 Запись на экзамен</button>
  </div>

  <!-- Еженедельный отчёт -->
  <div id="weekly-panel" class="form-panel active">
    <div class="row">
      <div class="field">
        <label>Имя Фамилия</label>
        <input type="text" id="weeklyName" placeholder="Введите имя и фамилию">
      </div>
      <div class="field">
        <label>Ваш ранг</label>
        <select id="weeklyRank">
          <option value="Специалист (3)">Специалист (3)</option>
          <option value="Капрал (4)">Капрал (4)</option>
          <option value="Сержант (5)">Сержант (5)</option>
          <option value="Штаб-сержант (6)">Штаб-сержант (6)</option>
          <option value="Уорент-офицер (7)">Уорент-офицер (7)</option>
          <option value="Старший Уорент-офицер (8)">Старший Уорент-офицер (8)</option>
          <option value="Лейтенант (9)">Лейтенант (9)</option>
          <option value="Капитан (10)">Капитан (10)</option>
          <option value="Майор (11)">Майор (11)</option>
          <option value="Подполковник (12)">Подполковник (12)</option>
        </select>
      </div>
    </div>

    <div class="date-row">
      <div class="field">
        <label>Дата начала</label>
        <input type="date" id="weeklyStartDate">
      </div>
      <div class="field">
        <label>Дата окончания</label>
        <input type="date" id="weeklyEndDate">
      </div>
    </div>

    <div class="activities-box" id="weeklyActivitiesContainer">
      <div class="activity-item">
        <input type="text" placeholder="Название активности" class="activity-name" value="Патруль">
        <input type="number" placeholder="Баллы" class="activity-points" value="5" min="1">
        <button class="remove-activity" type="button">✕</button>
      </div>
      <button class="add-activity-btn" id="addWeeklyActivity">➕ Добавить активность</button>
    </div>
    <div class="total-score" id="weeklyTotal">Всего баллов: 5</div>
    <button class="submit-btn" id="submitWeekly">📨 Отправить еженедельный отчёт</button>
  </div>

  <!-- Отчёт на повышение -->
  <div id="promotion-panel" class="form-panel">
    <div class="row">
      <div class="field">
        <label>Имя Фамилия</label>
        <input type="text" id="promoName" placeholder="Имя и фамилия">
      </div>
      <div class="field">
        <label>Ваш ранг</label>
        <select id="promoRank">
          <option value="Специалист (3)">Специалист (3)</option>
          <option value="Капрал (4)">Капрал (4)</option>
          <option value="Сержант (5)">Сержант (5)</option>
          <option value="Штаб-сержант (6)">Штаб-сержант (6)</option>
          <option value="Уорент-офицер (7)">Уорент-офицер (7)</option>
          <option value="Старший Уорент-офицер (8)">Старший Уорент-офицер (8)</option>
          <option value="Лейтенант (9)">Лейтенант (9)</option>
          <option value="Капитан (10)">Капитан (10)</option>
          <option value="Майор (11)">Майор (11)</option>
          <option value="Подполковник (12)">Подполковник (12)</option>
        </select>
      </div>
    </div>

    <div class="field promotion-date">
      <label>Дата последнего повышения</label>
      <input type="date" id="lastPromotionDate">
    </div>

    <div class="activities-box" id="promoActivitiesContainer">
      <div class="activity-item">
        <input type="text" placeholder="Активность" class="activity-name" value="Обучение">
        <input type="number" placeholder="Баллы" class="activity-points" value="10" min="1">
        <button class="remove-activity" type="button">✕</button>
      </div>
      <button class="add-activity-btn" id="addPromoActivity">➕ Добавить активность</button>
    </div>
    <div class="total-score" id="promoTotal">Всего баллов: 10</div>
    <button class="submit-btn" id="submitPromotion">📤 Подать на повышение</button>
  </div>

  <!-- Запись на экзамен -->
  <div id="exam-panel" class="form-panel">
    <div class="row">
      <div class="field">
        <label>Имя Фамилия</label>
        <input type="text" id="examName" placeholder="Введите имя">
      </div>
      <div class="field">
        <label>Тип экзамена</label>
        <select id="examType">
          <option value="Acd. Delta">Acd. Delta</option>
          <option value="3->4">3->4</option>
          <option value="4->5">4->5</option>
          <option value="5->6">5->6</option>
          <option value="6->7">6->7</option>
          <option value="7->8">7->8</option>
          <option value="8->9">8->9</option>
          <option value="9->10">9->10</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Discord тег</label>
        <input type="text" id="discordTag" placeholder="user#0000" class="discord-tag">
      </div>
      <div class="field">
        <label>Удобное время</label>
        <input type="text" id="examTime" placeholder="Например: 20:00 МСК">
      </div>
    </div>
    <button class="submit-btn" id="submitExam" style="margin-top:0.8rem;">✅ Записаться на экзамен</button>
  </div>
</div>

<script>
  (function() {
    // Переключение панелей
    const navBtns = document.querySelectorAll('.nav-btn');
    const panels = {
      weekly: document.getElementById('weekly-panel'),
      promotion: document.getElementById('promotion-panel'),
      exam: document.getElementById('exam-panel')
    };

    navBtns.forEach(btn => {
      btn.addEventListener('click', function(e) {
        const panelKey = this.dataset.panel;
        navBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        for (let [key, panel] of Object.entries(panels)) {
          panel.classList.remove('active');
          if (key === panelKey) panel.classList.add('active');
        }
      });
    });

    // Утилита пересчета баллов
    function recalcTotal(containerId, totalId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const pointInputs = container.querySelectorAll('.activity-points');
      let total = 0;
      pointInputs.forEach(inp => {
        let val = parseFloat(inp.value);
        if (!isNaN(val) && val > 0) total += val;
      });
      const totalEl = document.getElementById(totalId);
      if (totalEl) totalEl.textContent = `Всего баллов: ${total}`;
    }

    // Функция добавления активности
    function addActivity(containerId, totalId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const activityDiv = document.createElement('div');
      activityDiv.className = 'activity-item';
      activityDiv.innerHTML = `
        <input type="text" placeholder="Название активности" class="activity-name" value="">
        <input type="number" placeholder="Баллы" class="activity-points" value="1" min="1">
        <button class="remove-activity" type="button">✕</button>
      `;
      // Вставляем перед кнопкой добавления
      const addBtn = container.querySelector('.add-activity-btn');
      container.insertBefore(activityDiv, addBtn);
      
      // Навесить слушатели на новые поля и кнопку удаления
      const pointsInput = activityDiv.querySelector('.activity-points');
      const removeBtn = activityDiv.querySelector('.remove-activity');
      
      pointsInput.addEventListener('input', () => recalcTotal(containerId, totalId));
      removeBtn.addEventListener('click', function() {
        activityDiv.remove();
        recalcTotal(containerId, totalId);
      });
      
      recalcTotal(containerId, totalId);
    }

    // Инициализация существующих активностей и делегирование удаления
    function initActivities(containerId, totalId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      // Удаление через делегирование (на всякий случай и для динамических)
      container.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-activity')) {
          const item = e.target.closest('.activity-item');
          if (item) {
            item.remove();
            recalcTotal(containerId, totalId);
          }
        }
      });

      // Пересчет при изменении баллов
      container.addEventListener('input', (e) => {
        if (e.target.classList.contains('activity-points')) {
          recalcTotal(containerId, totalId);
        }
      });

      // Первичный обсчет
      recalcTotal(containerId, totalId);
    }

    // Привязка кнопок добавления
    document.getElementById('addWeeklyActivity').addEventListener('click', () => {
      addActivity('weeklyActivitiesContainer', 'weeklyTotal');
    });
    document.getElementById('addPromoActivity').addEventListener('click', () => {
      addActivity('promoActivitiesContainer', 'promoTotal');
    });

    // Инициализация
    initActivities('weeklyActivitiesContainer', 'weeklyTotal');
    initActivities('promoActivitiesContainer', 'promoTotal');

    // Отправка форм (демо-обработчики)
    function gatherActivityData(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return [];
      const items = container.querySelectorAll('.activity-item');
      const data = [];
      items.forEach(item => {
        const nameInput = item.querySelector('.activity-name');
        const pointsInput = item.querySelector('.activity-points');
        const name = nameInput ? nameInput.value.trim() : '';
        const points = pointsInput ? parseFloat(pointsInput.value) || 0 : 0;
        if (name !== '') {
          data.push({ name, points });
        }
      });
      return data;
    }

    document.getElementById('submitWeekly').addEventListener('click', () => {
      const name = document.getElementById('weeklyName').value.trim();
      const rank = document.getElementById('weeklyRank').value;
      const start = document.getElementById('weeklyStartDate').value;
      const end = document.getElementById('weeklyEndDate').value;
      const activities = gatherActivityData('weeklyActivitiesContainer');
      
      if (!name || !start || !end) {
        alert('Пожалуйста, заполните имя, даты начала и окончания.');
        return;
      }
      
      console.log('Еженедельный отчёт:', { name, rank, start, end, activities });
      alert(`Еженедельный отчёт для ${name} (${rank}) отправлен.\nПериод: ${start} – ${end}\nАктивностей: ${activities.length}`);
    });

    document.getElementById('submitPromotion').addEventListener('click', () => {
      const name = document.getElementById('promoName').value.trim();
      const rank = document.getElementById('promoRank').value;
      const lastPromo = document.getElementById('lastPromotionDate').value;
      const activities = gatherActivityData('promoActivitiesContainer');
      
      if (!name || !lastPromo) {
        alert('Заполните имя и дату последнего повышения.');
        return;
      }
      
      console.log('Отчёт на повышение:', { name, rank, lastPromo, activities });
      alert(`Запрос на повышение для ${name} (${rank}).\nПоследнее повышение: ${lastPromo}\nАктивностей: ${activities.length}`);
    });

    document.getElementById('submitExam').addEventListener('click', () => {
      const name = document.getElementById('examName').value.trim();
      const examType = document.getElementById('examType').value;
      const discord = document.getElementById('discordTag').value.trim();
      const time = document.getElementById('examTime').value.trim();
      
      if (!name || !discord || !time) {
        alert('Заполните имя, Discord тег и удобное время.');
        return;
      }
      
      console.log('Запись на экзамен:', { name, examType, discord, time });
      alert(`Запись на экзамен "${examType}" для ${name}.\nDiscord: ${discord}\nВремя: ${time}`);
    });

    // Автозаполнение дат (по желанию можно оставить пустыми)
    // Установим сегодняшнюю дату для удобства (необязательно)
    const today = new Date().toISOString().split('T')[0];
    if (!document.getElementById('weeklyStartDate').value) {
      document.getElementById('weeklyStartDate').value = today;
    }
    if (!document.getElementById('weeklyEndDate').value) {
      const nextWeek = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
      document.getElementById('weeklyEndDate').value = nextWeek;
    }
  })();
</script>
</body>
</html>
