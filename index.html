<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aetheris HR | Отчёты с баллами</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        body.light {
            background: linear-gradient(135deg, #e8edf9 0%, #f0f4ff 100%);
        }

        /* CSS переменные */
        :root {
            --glass-bg: rgba(18, 22, 45, 0.95);
            --glass-border: rgba(88, 101, 242, 0.3);
            --card-bg: rgba(18, 22, 45, 0.95);
            --text-primary: #F0F3FA;
            --text-secondary: #A0A8C3;
            --text-muted: #6C728E;
            --accent: #6366F1;
            --accent-glow: #818cf8;
            --accent-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --border-light: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
            --input-bg: rgba(15, 18, 35, 0.9);
        }

        body.light {
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(99, 102, 241, 0.2);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --accent: #5865F2;
            --accent-glow: #7984f5;
            --accent-dark: #4752C4;
            --border-light: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(255, 255, 255, 0.9);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: var(--shadow-sm);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A5B4FC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s;
            z-index: 100;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        /* Главная карточка */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(79, 70, 229, 0.05));
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h2 i {
            color: var(--accent);
        }

        .card-body {
            padding: 32px;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-glow);
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Период */
        .period-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 16px;
        }

        .period-info {
            background: rgba(99, 102, 241, 0.08);
            border-radius: 14px;
            padding: 12px 16px;
            text-align: center;
            color: var(--accent-glow);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* ========== КАРТОЧКА ДЕЙСТВИЯ ========== */
        .actions-container {
            margin: 24px 0;
        }

        .action-card {
            background: rgba(15, 18, 35, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-light);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: actionAppear 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes actionAppear {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .action-card:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.2);
        }

        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .action-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-title i {
            color: var(--accent);
        }

        .remove-action {
            background: rgba(239, 68, 68, 0.15);
            border: none;
            color: #f87171;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .remove-action:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.02);
        }

        /* Поля внутри карточки действия */
        .action-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .action-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .action-field label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .action-field select, .action-field input {
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .action-field select:focus, .action-field input:focus {
            border-color: var(--accent);
        }

        .proofs-field {
            grid-column: span 2;
        }

        .proofs-field input {
            width: 100%;
            padding: 10px 14px;
        }

        .points-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
        }

        .points-badge {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
        }

        .count-badge {
            background: rgba(99, 102, 241, 0.15);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: var(--accent-glow);
        }

        /* Кнопка добавления */
        .add-btn {
            width: 100%;
            background: rgba(99, 102, 241, 0.12);
            border: 1px dashed var(--accent);
            border-radius: 18px;
            padding: 16px;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin: 16px 0;
        }

        .add-btn:hover {
            background: rgba(99, 102, 241, 0.25);
            transform: translateY(-2px);
            gap: 16px;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            background: rgba(15, 18, 35, 0.4);
            border-radius: 20px;
            margin-bottom: 16px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Кнопка отправки */
        .submit-btn {
            width: 100%;
            background: linear-gradient(105deg, var(--accent), var(--accent-dark));
            border: none;
            padding: 16px;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            transform: none;
        }

        /* Уведомления */
        .alert {
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.15);
            border-left: 3px solid #10b981;
            color: #34d399;
            display: flex;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.12);
            border-left: 3px solid #ef4444;
            color: #fca5a5;
            display: flex;
        }

        @media (max-width: 640px) {
            .action-fields {
                grid-template-columns: 1fr;
            }
            .proofs-field {
                grid-column: span 1;
            }
            .period-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .card-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeSwitch">
        <i class="fas fa-sun"></i>
        <span>Светлая тема</span>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-scroll"></i></div>
                <h1>Aetheris HR</h1>
            </div>
            <p class="subtitle">Система подачи отчётов с балльной системой</p>
        </div>

        <div class="glass-card">
            <div class="card-header">
                <h2>
                    <i class="fas fa-user"></i>
                    ИНФОРМАЦИЯ О СОТРУДНИКЕ
                </h2>
            </div>
            <div class="card-body">
                <div id="alertContainer"></div>

                <!-- Игровой никнейм -->
                <div class="input-group">
                    <label>ИГРОВОЙ НИКНЕЙМ</label>
                    <input type="text" id="nickname" placeholder="Введите никнейм">
                </div>

                <!-- Ранг -->
                <div class="input-group">
                    <label>РАНГ СОТРУДНИКА</label>
                    <select id="rank">
                        <option value="">-- Выберите ранг --</option>
                        <option value="Специалист (3)">Специалист (3)</option>
                        <option value="Капрал (4)">Капрал (4)</option>
                        <option value="Сержант (5)">Сержант (5)</option>
                        <option value="Штаб-сержант (6)">Штаб-сержант (6)</option>
                        <option value="Уорент-офицер (7)">Уорент-офицер (7)</option>
                        <option value="Старший Уорент-офицер (8)">Старший Уорент-офицер (8)</option>
                        <option value="Лейтенант (9)">Лейтенант (9)</option>
                        <option value="Капитан (10)">Капитан (10)</option>
                        <option value="Майор (11)">Майор (11)</option>
                        <option value="Подполковник (12)">Подполковник (12)</option>
                    </select>
                </div>

                <!-- Период -->
                <div class="period-row">
                    <div class="input-group">
                        <label>ДАТА НАЧАЛА</label>
                        <input type="date" id="dateStart">
                    </div>
                    <div class="input-group">
                        <label>ДАТА ОКОНЧАНИЯ</label>
                        <input type="date" id="dateEnd">
                    </div>
                </div>
                <div class="period-info" id="periodInfo">
                    04.05.2026 – 10.05.2026 (7 дн.)
                </div>

                <!-- ДЕЙСТВИЯ С ДОКАЗАТЕЛЬСТВАМИ -->
                <div style="margin-top: 32px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <label style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--accent-glow);">
                            <i class="fas fa-clipboard-list"></i> ДЕЙСТВИЯ С ДОКАЗАТЕЛЬСТВАМИ
                        </label>
                    </div>

                    <div id="actionsContainer">
                        <div id="emptyActions" class="empty-state">
                            <i class="fas fa-info-circle"></i> Нет действий с доказательствами
                        </div>
                        <div id="actionsList"></div>
                    </div>

                    <button class="add-btn" id="addActionBtn">
                        <i class="fas fa-plus-circle"></i> ДОБАВИТЬ
                    </button>
                </div>

                <!-- Кнопка отправки -->
                <button class="submit-btn" id="submitBtn">
                    <i class="fab fa-discord"></i> ОТПРАВИТЬ ОТЧЁТ
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // 🔒 ВЕБХУК (ЗАМЕНИТЕ НА ВАШ)
        // ============================================
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1501267296432291945/fCHeDuYb4eVyHyUT_SRJgtnjE6DlbTCwubCKP_NEfytsMohVPDz5wHSYObiEmNqvEM2b';

        // Список типов активностей с баллами
        const ACTIVITY_TYPES = [
            { name: "Участие в ГМП", basePoints: 10 },
            { name: "Участие в МП", basePoints: 5 },
            { name: "Участие в лекции/тренировке", basePoints: 5 },
            { name: "Проведение лекции/тренировки", basePoints: 10 },
            { name: "Отбитие ФЗ/ФТ", basePoints: 15 },
            { name: "Участие в оцеплении захваченной Государственной структуры/Банка", basePoints: 10 },
            { name: "Участие в отбитии поезда", basePoints: 5 },
            { name: "Участие в рейде/экономическом рейде", basePoints: 10 },
            { name: "Участие в поставке", basePoints: 10 },
            { name: "Участие в отбитие анальгетика", basePoints: 15 },
            { name: "Задержание", basePoints: 5 },
            { name: "Участие в мед. проверке", basePoints: 10 },
            { name: "Участие в прок. проверке", basePoints: 10 },
            { name: "Участие в AirDrop", basePoints: 5 },
            { name: "Патруль по ФЗ (1 час)", basePoints: 4 },
            { name: "Патруль вне ФЗ (1 час)", basePoints: 8 },
            { name: "Участие в Вечернем построении", basePoints: 4 },
            { name: "Участие в ЧР", basePoints: 10 },
            { name: "Передача задержанного сотрудникам CID", basePoints: 10 }
        ];

        let actions = [];

        // Утилиты
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updatePeriodInfo() {
            const start = document.getElementById('dateStart').value;
            const end = document.getElementById('dateEnd').value;
            const infoSpan = document.getElementById('periodInfo');
            if (start && end) {
                const startDate = new Date(start);
                const endDate = new Date(end);
                const diffDays = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
                infoSpan.innerHTML = `${formatDate(start)} – ${formatDate(end)} (${diffDays} дн.)`;
            } else {
                const today = new Date();
                const monday = new Date(today);
                monday.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1));
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);
                infoSpan.innerHTML = `${formatDate(monday)} – ${formatDate(sunday)} (7 дн.)`;
            }
        }

        function calculatePoints(action) {
            let points = action.basePoints || 0;
            let count = parseInt(action.count) || 1;
            if (action.type === "Патруль по ФЗ (1 час)" || action.type === "Патруль вне ФЗ (1 час)") {
                points = points * count;
            }
            return points * count;
        }

        function renderActions() {
            const container = document.getElementById('actionsList');
            const emptyDiv = document.getElementById('emptyActions');
            
            if (actions.length === 0) {
                emptyDiv.style.display = 'block';
                container.innerHTML = '';
                return;
            }
            
            emptyDiv.style.display = 'none';
            
            container.innerHTML = actions.map((action, idx) => {
                const totalPoints = calculatePoints(action);
                return `
                    <div class="action-card" data-idx="${idx}">
                        <div class="action-header">
                            <div class="action-title">
                                <i class="fas fa-tag"></i> ДЕЙСТВИЕ #${idx + 1}
                            </div>
                            <button class="remove-action" data-idx="${idx}">
                                <i class="fas fa-trash"></i> Удалить
                            </button>
                        </div>
                        <div class="action-fields">
                            <div class="action-field">
                                <label>ТИП</label>
                                <select class="action-type" data-idx="${idx}">
                                    <option value="">-- Выберите --</option>
                                    ${ACTIVITY_TYPES.map(t => `<option value="${escapeHtml(t.name)}" data-points="${t.basePoints}" ${action.type === t.name ? 'selected' : ''}>${escapeHtml(t.name)}</option>`).join('')}
                                </select>
                            </div>
                            <div class="action-field">
                                <label>КОЛ-ВО</label>
                                <input type="number" class="action-count" data-idx="${idx}" value="${action.count || 1}" min="1" step="1">
                            </div>
                            <div class="action-field proofs-field">
                                <label>ДОКАЗАТЕЛЬСТВА (ССЫЛКИ)</label>
                                <input type="text" class="action-proofs" data-idx="${idx}" placeholder="Ссылки на скриншоты/видео..." value="${escapeHtml(action.proofs || '')}">
                            </div>
                        </div>
                        <div class="points-row">
                            <span class="count-badge"><i class="fas fa-hashtag"></i> КОЛ-ВО: ${action.count || 1}</span>
                            <span class="points-badge"><i class="fas fa-star"></i> БАЛЛЫ: ${totalPoints}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Назначить обработчики
            document.querySelectorAll('.action-type').forEach(select => {
                select.addEventListener('change', (e) => {
                    const idx = parseInt(select.dataset.idx);
                    const selectedOption = select.options[select.selectedIndex];
                    const points = parseInt(selectedOption.dataset.points) || 0;
                    if (!isNaN(idx) && actions[idx]) {
                        actions[idx].type = select.value;
                        actions[idx].basePoints = points;
                        renderActions();
                    }
                });
            });
            
            document.querySelectorAll('.action-count').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = parseInt(input.dataset.idx);
                    if (!isNaN(idx) && actions[idx]) {
                        actions[idx].count = parseInt(input.value) || 1;
                        renderActions();
                    }
                });
            });
            
            document.querySelectorAll('.action-proofs').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = parseInt(input.dataset.idx);
                    if (!isNaN(idx) && actions[idx]) {
                        actions[idx].proofs = input.value;
                    }
                });
            });
            
            document.querySelectorAll('.remove-action').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    if (!isNaN(idx)) {
                        actions.splice(idx, 1);
                        renderActions();
                    }
                });
            });
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        async function sendToDiscord(content) {
            if (!WEBHOOK_URL) throw new Error('Webhook не настроен');
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'HR Отчёт', content })
            });
            if (!response.ok) throw new Error(`Ошибка HTTP ${response.status}`);
            return true;
        }

        function formatReport() {
            const nickname = document.getElementById('nickname').value.trim() || 'Не указан';
            const rank = document.getElementById('rank').value || 'Не выбран';
            const start = document.getElementById('dateStart').value;
            const end = document.getElementById('dateEnd').value;
            let period = '';
            if (start && end) period = `${formatDate(start)} – ${formatDate(end)}`;
            else period = 'Не указан';
            
            let actionsText = '';
            let totalPoints = 0;
            
            actions.forEach((action, idx) => {
                const points = calculatePoints(action);
                totalPoints += points;
                actionsText += `\n**${idx + 1}. ${action.type || 'Не выбран'}**`;
                actionsText += `\n   📊 Кол-во: ${action.count || 1} | 🎯 Баллы: ${points}`;
                if (action.proofs) actionsText += `\n   📎 Доказательства: ${action.proofs}`;
                else actionsText += `\n   ⚠️ Доказательства не приложены`;
                actionsText += `\n`;
            });
            
            if (actions.length === 0) actionsText = '\nНет действий с доказательствами';
            
            return `**📋 ЕЖЕНЕДЕЛЬНЫЙ ОТЧЁТ**

**👤 Игровой никнейм:** ${nickname}
**🎖️ Ранг:** ${rank}
**📅 Период:** ${period}

**📊 ДЕЙСТВИЯ:**
${actionsText}

**🏆 ИТОГО БАЛЛОВ:** ${totalPoints}

_Отправлено через Aetheris HR_`;
        }

        // Добавление нового действия
        document.getElementById('addActionBtn').addEventListener('click', () => {
            actions.push({
                type: '',
                basePoints: 0,
                count: 1,
                proofs: ''
            });
            renderActions();
            // Плавный скролл к новому действию
            setTimeout(() => {
                const lastAction = document.querySelector('.action-card:last-child');
                if (lastAction) {
                    lastAction.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    lastAction.style.borderColor = 'var(--accent)';
                    setTimeout(() => {
                        lastAction.style.borderColor = '';
                    }, 1000);
                }
            }, 100);
        });

        // Отправка отчёта
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                showAlert('Введите игровой никнейм', 'error');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отправка...';
            
            try {
                const content = formatReport();
                await sendToDiscord(content);
                showAlert('✅ Отчёт успешно отправлен в Discord!', 'success');
                
                // Очистка формы
                document.getElementById('nickname').value = '';
                document.getElementById('rank').value = '';
                actions = [];
                renderActions();
                setDefaultDates();
            } catch (err) {
                showAlert(`❌ Ошибка: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-discord"></i> ОТПРАВИТЬ ОТЧЁТ';
            }
        });

        function setDefaultDates() {
            const today = new Date();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1));
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            document.getElementById('dateStart').value = monday.toISOString().split('T')[0];
            document.getElementById('dateEnd').value = sunday.toISOString().split('T')[0];
            updatePeriodInfo();
        }

        // Тема
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.body.classList.add('light');
                document.querySelector('#themeSwitch i').className = 'fas fa-moon';
                document.querySelector('#themeSwitch span').innerText = 'Тёмная тема';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            const icon = document.querySelector('#themeSwitch i');
            const text = document.querySelector('#themeSwitch span');
            if (isLight) {
                icon.className = 'fas fa-moon';
                text.innerText = 'Тёмная тема';
            } else {
                icon.className = 'fas fa-sun';
                text.innerText = 'Светлая тема';
            }
        }

        document.getElementById('themeSwitch').addEventListener('click', toggleTheme);
        document.getElementById('dateStart').addEventListener('change', updatePeriodInfo);
        document.getElementById('dateEnd').addEventListener('change', updatePeriodInfo);
        
        initTheme();
        setDefaultDates();
        renderActions();
    </script>
</body>
</html>
