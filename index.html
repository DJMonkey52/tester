    <style>
        * {

            padding: 0;

        :root {

            --text-secondary: #B0C4B0;

            --accent-dark: #2E7D32;

            --input-bg: rgba(5, 20, 5, 0.9);
            --card-hover: rgba(76, 175, 80, 0.12);
            --empty-bg: rgba(10, 25, 10, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2a0a 0%, #0d2e0d 100%);

        body.mpb-theme { background: linear-gradient(135deg, #1a2a5a 0%, #1e3a6e 100%); --empty-bg: rgba(20, 35, 60, 0.6); }

        .main-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .main-card-icon { width: 70px; height: 70px; background: linear-gradient(135deg, rgba(139,191,107,0.25), rgba(106,154,74,0.15)); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 32px; color: var(--accent); }
        .main-card h3 { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); }
        .main-card p { color: var(--text-secondary); font-size: 0.8rem; }
        .reports-page, .form-page { display: none; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .back-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-radius: 50px; padding: 10px 22px; color: var(--text-primary); font-weight: 500; cursor: pointer; margin-bottom: 24px; transition: all 0.2s; }
        .back-btn:hover { border-color: var(--accent); transform: translateX(-4px); }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: 32px; border: 1px solid var(--glass-border); box-shadow: var(--shadow-md); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, rgba(76,175,80,0.15), rgba(46,125,50,0.08)); padding: 20px 28px; border-bottom: 1px solid var(--border-light); }
        .card-header h2 { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
        .card-body { padding: 28px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.3px; color: var(--accent-glow); margin-bottom: 6px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 14px; background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 14px; font-size: 0.9rem; color: var(--text-primary); font-family: 'Inter', sans-serif; transition: all 0.2s; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(76,175,80,0.25); }
        .empty-state { text-align: center; padding: 30px; color: var(--text-muted); background: var(--empty-bg); border-radius: 18px; margin-bottom: 14px; border: 1px dashed var(--glass-border); }
        .submit-btn { width: 100%; background: linear-gradient(105deg, var(--accent), var(--accent-dark)); border: none; padding: 14px; border-radius: 22px; font-size: 0.95rem; font-weight: 700; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-3px); filter: brightness(1.05); }
        .footer-signature { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-light); color: var(--text-muted); font-size: 0.8rem; }
        .alert { padding: 12px 16px; border-radius: 14px; margin-bottom: 20px; display: none; align-items: center; gap: 10px; font-weight: 500; animation: slideIn 0.3s ease; }
        .alert.success { background: rgba(16, 185, 129, 0.15); border-left: 3px solid #10b981; color: #10b981; display: flex; }
        .alert.error { background: rgba(239, 68, 68, 0.12); border-left: 3px solid #ef4444; color: #f87171; display: flex; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
        @media (max-width: 850px) { .main-cards-grid { grid-template-columns: repeat(2, 1fr); } .main-cards-grid { gap: 20px; } }
        @media (max-width: 550px) { .main-cards-grid { grid-template-columns: 1fr; } }
        .period-info { background: rgba(76,175,80,0.1); border-radius: 12px; padding: 10px 14px; text-align: center; color: var(--accent-glow); font-size: 0.85rem; margin-bottom: 20px; }
    </style>
</head>

        function setPageTitle(deptName){document.getElementById('pageTitle').innerHTML=deptName?`ARMY | ${deptName}`:'ARMY';updateTitleColor(currentDepartment);}
        const deptNames={academy:'Academy',military:'Military Academy',division:'Division',mpb:'MPB',usaf:'USAF',delta:'Delta'};
        function loadDepartmentPage(dept){currentDepartment=dept;setTheme(dept);setPageTitle(deptNames[dept]);const reports=(()=>{if(dept==='usaf')return[{id:'pilotQual',name:'✈️ Повышение квалификации пилота',desc:'Повышение категории пилотирования',icon:'fa-wings'},{id:'routeExam',name:'🗺️ Прохождение маршрута',desc:'Сдача маршрута для пилотов',icon:'fa-map-marked-alt'}];if(dept==='academy')return[{id:'promotion',name:'⬆️ Отчёт на повышение',desc:'Заявка на повышение',icon:'fa-arrow-up'},{id:'exam',name:'📝 Запись на экзамен',desc:'Запись на экзамен',icon:'fa-pen-clip'}];return[{id:'weekly',name:'📊 Еженедельный отчёт',desc:'Отчёт о работе',icon:'fa-calendar-week'},{id:'promotion',name:'⬆️ Отчёт на повышение',desc:'Заявка на повышение',icon:'fa-arrow-up'},{id:'exam',name:'📝 Запись на экзамен',desc:'Запись на экзамен',icon:'fa-pen-clip'}];})();const grid=document.getElementById('reportsGrid');grid.innerHTML=reports.map(r=>`<div class="action-card" data-page="${r.id}" style="background:var(--glass-bg);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:32px;padding:35px 28px;width:280px;cursor:pointer;text-align:center;"><div class="card-icon" style="width:70px;height:70px;background:linear-gradient(135deg, rgba(139,191,107,0.25), rgba(106,154,74,0.15));border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:32px;color:var(--accent);"><i class="fas ${r.icon}"></i></div><h3 style="color:var(--text-primary);">${r.name}</h3><p style="color:var(--text-secondary);">${r.desc}</p><div class="card-arrow" style="margin-top:16px;color:var(--accent);"><i class="fas fa-arrow-right"></i></div></div>`).join('');document.querySelectorAll('#reportsGrid .action-card').forEach(card=>{card.addEventListener('click',()=>showFormPage(`${card.dataset.page}Page`));});showReportsPage();}
        function showMainMenu(){setTheme(null);currentDepartment=null;setPageTitle(null);document.getElementById('mainMenuPage').style.display='flex';document.getElementById('reportsPage').style.display='none';document.querySelectorAll('.form-page').forEach(p=>p.style.display='none');}
        function showReportsPage(){document.getElementById('mainMenuPage').style.display='none';document.getElementById('reportsPage').style.display='block';document.querySelectorAll('.form-page').forEach(p=>p.style.display='none');}
        function showFormPage(pageId){document.getElementById('mainMenuPage').style.display='none';document.getElementById('reportsPage').style.display='none';document.querySelectorAll('.form-page').forEach(p=>p.style.display='none');document.getElementById(pageId).style.display='block';window.scrollTo({top:0});}
        document.querySelectorAll('.main-card').forEach(c=>c.addEventListener('click',()=>loadDepartmentPage(c.dataset.main)));
        // Инициализация пустых экшнов (для weekly/promotion если понадобятся)
        function renderWeeklyActions(){} 
        function renderPromotionActions(){}
        window.showMainMenu=showMainMenu;
        window.showReportsPage=showReportsPage;
        // Pilot submit
        document.getElementById('pilotSubmitBtn')?.addEventListener('click',async()=>{const fn=document.getElementById('pilotFullName').value.trim();if(!fn){showAlert('pilotAlert','Введите имя и фамилию','error');return;}const cur=document.getElementById('pilotCurrentCat').value;const targ=document.getElementById('pilotTargetCat').value;const hours=document.getElementById('pilotHours').value.trim();const audit=document.getElementById('pilotAuditLink').value.trim();const date=document.getElementById('pilotDate').value;const btn=document.getElementById('pilotSubmitBtn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-pulse"></i> Отправка...';try{await sendToDiscord(WEBHOOKS[currentDepartment],'✈️ Повышение квалификации пилота',[{name:'👤 Имя Фамилия',value:fn,inline:true},{name:'📌 Текущая категория',value:cur||'Не указана',inline:true},{name:'🎯 Целевая категория',value:targ||'Не указана',inline:true},{name:'⏱️ Налёт часов',value:hours||'Не указан',inline:true},{name:'📎 Ссылка на кадровый аудит',value:audit||'Нет',inline:false},{name:'📅 Дата подачи',value:date?formatDate(date):'Не указана',inline:true}]);showAlert('pilotAlert','✅ Запрос отправлен!','success');document.getElementById('pilotFullName').value='';document.getElementById('pilotCurrentCat').value='';document.getElementById('pilotTargetCat').value='';document.getElementById('pilotHours').value='';document.getElementById('pilotAuditLink').value='';document.getElementById('pilotDate').value='';}catch(e){showAlert('pilotAlert',`❌ Ошибка: ${e.message}`,'error');}finally{btn.disabled=false;btn.innerHTML='<i class="fab fa-discord"></i> 📨 ОТПРАВИТЬ ЗАПРОС';}});
        // Route submit
        document.getElementById('routeSubmitBtn')?.addEventListener('click',async()=>{const nick=document.getElementById('routeNick').value.trim();if(!nick){showAlert('routeAlert','Введите ник','error');return;}const rdate=document.getElementById('routeDate').value;const rtype=document.getElementById('routeType').value;const rlink=document.getElementById('routeLink').value.trim();const btn=document.getElementById('routeSubmitBtn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-pulse"></i> Отправка...';try{await sendToDiscord(WEBHOOKS[currentDepartment],'🗺️ Прохождение маршрута',[{name:'👤 Ник (Имя Фамилия)',value:nick,inline:true},{name:'📅 Дата прохождения',value:rdate?formatDate(rdate):'Не указана',inline:true},{name:'🛣️ Маршрут',value:rtype||'Не выбран',inline:true},{name:'🔗 Ссылка',value:rlink||'Нет',inline:false}]);showAlert('routeAlert','✅ Заявка отправлена!','success');document.getElementById('routeNick').value='';document.getElementById('routeDate').value='';document.getElementById('routeType').value='';document.getElementById('routeLink').value='';}catch(e){showAlert('routeAlert',`❌ Ошибка: ${e.message}`,'error');}finally{btn.disabled=false;btn.innerHTML='<i class="fab fa-discord"></i> 📨 ОТПРАВИТЬ ЗАЯВКУ';}});
        // stub promotion/weekly/exam forms (рабочие ссылки)
        async function stubSubmit(){showAlert('weeklyAlert','Форма временно недоступна для демо','error');}
        document.getElementById('weeklySubmitBtn')?.addEventListener('click',stubSubmit);
        document.getElementById('promotionSubmitBtn')?.addEventListener('click',stubSubmit);
        document.getElementById('examSubmitBtn')?.addEventListener('click',async()=>{const name=document.getElementById('examFullName')?.value.trim();if(!name){showAlert('examAlert','Введите имя','error');return;}const type=document.getElementById('examType')?.value;const disc=document.getElementById('examDiscord')?.value;const time=document.getElementById('examTime')?.value;const btn=document.getElementById('examSubmitBtn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-pulse"></i> Отправка...';try{await sendToDiscord(WEBHOOKS[currentDepartment],'📝 Запись на экзамен',[{name:'👤 Имя и фамилия',value:name,inline:true},{name:'🎓 Тип экзамена',value:type||'Не выбран',inline:true},{name:'💬 Discord',value:disc||'Не указан',inline:true},{name:'⏰ Удобное время',value:time||'Не указано',inline:false}]);showAlert('examAlert','✅ Заявка отправлена!','success');document.getElementById('examFullName').value='';document.getElementById('examType').value='';document.getElementById('examDiscord').value='';document.getElementById('examTime').value='';}catch(e){showAlert('examAlert',`❌ ${e.message}`,'error');}finally{btn.disabled=false;btn.innerHTML='<i class="fab fa-discord"></i> 📨 ЗАПИСАТЬСЯ НА ЭКЗАМЕН';}});
        document.getElementById('themeSwitch').onclick=()=>{document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');const icon=document.querySelector('#themeSwitch i'),text=document.querySelector('#themeSwitch span');if(document.body.classList.contains('light')){icon.className='fas fa-moon';text.innerText='Тёмная тема';}else{icon.className='fas fa-sun';text.innerText='Светлая тема';}};
        if(localStorage.getItem('theme')==='light')document.body.classList.add('light');
        showMainMenu();
        // Дополнительно установка пустых пустых состояний под цвет темы через CSS переменную
    </script>
</body>
</html>
