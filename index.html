<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 2em; margin-bottom: 10px; }
    .content { padding: 30px; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .actions-list {
      background: #f5f5f5;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
    }
    .action-item {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .action-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .action-name {
      font-weight: bold;
      font-size: 16px;
    }
    .action-points {
      color: #667eea;
      font-weight: bold;
    }
    .action-details {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .quantity-control input {
      width: 100px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .btn-secondary {
      background: #6b7280;
      color: white;
    }
    .action-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .action-selector select {
      flex: 1;
    }
    .action-selector button {
      white-space: nowrap;
    }
    .total-points {
      position: sticky;
      bottom: 20px;
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }
    .alert {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    @media (max-width: 768px) {
      .row { grid-template-columns: 1fr; }
      .action-header { flex-direction: column; align-items: flex-start; gap: 5px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 Система отчетов SWAT</h1>
    <p>Заполните форму для отправки еженедельного отчета</p>
  </div>
  <div class="content">
    <div id="alert"></div>
    
    <div class="form-group">
      <label>👤 Игровой никнейм *</label>
      <input type="text" id="employee" placeholder="Введите ваш игровой никнейм">
    </div>
    
    <div class="row">
      <div class="form-group">
        <label>⭐ Ранг *</label>
        <select id="rank"></select>
      </div>
      <div class="form-group">
        <label>📅 Период (дней)</label>
        <input type="number" id="periodDays" value="7" min="1" max="14">
      </div>
    </div>
    
    <div class="row">
      <div class="form-group">
        <label>📅 Дата начала *</label>
        <input type="date" id="startDate">
      </div>
      <div class="form-group">
        <label>📅 Дата окончания *</label>
        <input type="date" id="endDate">
      </div>
    </div>
    
    <div class="actions-list">
      <h3>📋 Список действий</h3>
      <div class="action-selector">
        <select id="actionType">
          <option value="">Выберите действие...</option>
        </select>
        <button class="btn btn-primary" onclick="addAction()">➕ Добавить действие</button>
      </div>
      <div id="actionsContainer"></div>
    </div>
    
    <div class="total-points" id="totalPoints">
      Общие баллы: 0
    </div>
    
    <div style="text-align: center; margin-top: 20px;">
      <button class="btn btn-primary" onclick="submitReport()" style="padding: 15px 40px; font-size: 16px;">
        📤 Отправить отчет
      </button>
    </div>
  </div>
</div>

<script>
let actions = [];
let pointsData = {};
let ranksData = {};

// Инициализация
async function init() {
  try {
    pointsData = await google.script.run.withSuccessHandler(data => {
      pointsData = data;
      populateActionSelect();
    }).getPointsSystem();
    
    ranksData = await google.script.run.withSuccessHandler(data => {
      ranksData = data;
      populateRanks();
    }).getRanks();
    
    // Установка дат
    const today = new Date();
    const weekAgo = new Date(today.getTime() - 7 * 86400000);
    document.getElementById('startDate').value = weekAgo.toISOString().split('T')[0];
    document.getElementById('endDate').value = today.toISOString().split('T')[0];
  } catch (error) {
    showAlert('Ошибка загрузки данных: ' + error.message, 'error');
  }
}

function populateActionSelect() {
  const select = document.getElementById('actionType');
  select.innerHTML = '<option value="">Выберите действие...</option>';
  for (const [key, value] of Object.entries(pointsData)) {
    const option = document.createElement('option');
    option.value = key;
    option.textContent = `${value.name} (${value.points} баллов)`;
    select.appendChild(option);
  }
}

function populateRanks() {
  const select = document.getElementById('rank');
  select.innerHTML = '';
  for (const [key, value] of Object.entries(ranksData)) {
    const option = document.createElement('option');
    option.value = key;
    option.textContent = value.name;
    select.appendChild(option);
  }
}

function addAction() {
  const select = document.getElementById('actionType');
  const actionKey = select.value;
  if (!actionKey) {
    showAlert('Выберите действие', 'error');
    return;
  }
  
  const actionData = pointsData[actionKey];
  if (!actionData) return;
  
  const quantity = actionData.requiresQuantity ? 1 : 1;
  const points = actionData.requiresQuantity ? actionData.points * quantity : actionData.points;
  
  const action = {
    id: Date.now() + Math.random(),
    type: actionKey,
    name: actionData.name,
    basePoints: actionData.points,
    points: points,
    quantity: quantity,
    category: actionData.category,
    evidence: '',
    requiresQuantity: actionData.requiresQuantity || false,
    maxQuantity: actionData.maxQuantity || 1,
    unit: actionData.unit || null
  };
  
  actions.push(action);
  renderActions();
  select.value = '';
  updateTotalPoints();
}

function removeAction(id) {
  actions = actions.filter(a => a.id !== id);
  renderActions();
  updateTotalPoints();
}

function updateActionQuantity(id, quantity) {
  const action = actions.find(a => a.id === id);
  if (action) {
    let qty = parseInt(quantity) || 1;
    qty = Math.min(Math.max(qty, 1), action.maxQuantity);
    action.quantity = qty;
    action.points = action.basePoints * qty;
    if (action.type === 'fish_seizure') action.points = qty;
    renderActions();
    updateTotalPoints();
  }
}

function updateActionEvidence(id, evidence) {
  const action = actions.find(a => a.id === id);
  if (action) {
    action.evidence = evidence;
  }
}

function updateTotalPoints() {
  const total = actions.reduce((sum, a) => sum + a.points, 0);
  document.getElementById('totalPoints').innerHTML = `💰 Общие баллы: ${total}`;
}

function renderActions() {
  const container = document.getElementById('actionsContainer');
  if (actions.length === 0) {
    container.innerHTML = '<p style="text-align: center; color: #999;">Нет добавленных действий. Выберите действие выше.</p>';
    return;
  }
  
  container.innerHTML = actions.map(action => `
    <div class="action-item">
      <div class="action-header">
        <span class="action-name">${action.name}</span>
        <span class="action-points">${action.points} баллов</span>
        <button class="btn btn-danger" onclick="removeAction(${action.id})" style="padding: 5px 10px;">🗑️</button>
      </div>
      <div class="action-details">
        ${action.requiresQuantity ? `
          <div class="quantity-control">
            <label>Количество (${action.unit || 'раз'}):</label>
            <input type="number" min="1" max="${action.maxQuantity}" value="${action.quantity}" 
                   onchange="updateActionQuantity(${action.id}, this.value)">
            <span>× ${action.basePoints} = ${action.basePoints * action.quantity} баллов</span>
          </div>
        ` : ''}
        <div>
          <label>${action.category === 'withEvidence' ? '🔗 Ссылки на доказательства (по 1 на строку):' : '✅ Действие без доказательств'}</label>
          ${action.category === 'withEvidence' ? 
            `<textarea rows="3" placeholder="https://discord.com/channels/...&#10;https://imgur.com/..." 
                       onchange="updateActionEvidence(${action.id}, this.value)">${action.evidence}</textarea>` :
            '<input type="text" disabled value="Без доказательств">'
          }
        </div>
      </div>
    </div>
  `).join('');
}

async function submitReport() {
  const employee = document.getElementById('employee').value.trim();
  const rank = document.getElementById('rank').value;
  const rankSelect = document.getElementById('rank');
  const rankName = rankSelect.options[rankSelect.selectedIndex]?.text || '';
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const periodDays = parseInt(document.getElementById('periodDays').value);
  
  if (!employee) {
    showAlert('Введите игровой никнейм', 'error');
    return;
  }
  if (!rank) {
    showAlert('Выберите ранг', 'error');
    return;
  }
  if (!startDate || !endDate) {
    showAlert('Выберите период', 'error');
    return;
  }
  if (actions.length === 0) {
    showAlert('Добавьте хотя бы одно действие', 'error');
    return;
  }
  
  const formData = {
    employee: employee,
    rank: rank,
    rankName: rankName,
    startDate: startDate,
    endDate: endDate,
    periodDays: periodDays,
    actions: actions.map(a => ({
      type: a.type,
      name: a.name,
      quantity: a.quantity,
      basePoints: a.basePoints,
      points: a.points,
      evidence: a.evidence,
      category: a.category,
      unit: a.unit
    }))
  };
  
  try {
    showAlert('⏳ Отправка отчета...', 'info');
    const result = await google.script.run.withSuccessHandler(data => {
      if (data.success) {
        showAlert(data.message, 'success');
        actions = [];
        renderActions();
        updateTotalPoints();
        document.getElementById('employee').value = '';
      } else {
        showAlert(data.message, 'error');
      }
    }).withFailureHandler(error => {
      showAlert('Ошибка: ' + error.message, 'error');
    }).processForm(formData);
  } catch (error) {
    showAlert('Ошибка: ' + error.message, 'error');
  }
}

function showAlert(message, type) {
  const alertDiv = document.getElementById('alert');
  const alertClass = type === 'error' ? 'alert-error' : (type === 'success' ? 'alert-success' : 'alert-info');
  alertDiv.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
  setTimeout(() => {
    alertDiv.innerHTML = '';
  }, 5000);
}

// Запуск инициализации
init();
</script>
</body>
</html>
